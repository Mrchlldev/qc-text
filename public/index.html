<!DOCTYPE html>
<html lang="id" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>QC Kata Kata</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg fixed-top glass-navbar">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">QC Kata Kata</a>

      <div class="d-flex gap-2">
        <button id="themeBtn" class="btn btn-sm btn-outline-light">Dark</button>

        <div class="dropdown">
          <button class="btn btn-sm btn-light" data-bs-toggle="dropdown">☰</button>

          <div class="dropdown-menu dropdown-menu-end p-3 author-dropdown">
            <div class="author-card">
              <h6 class="mb-1">Marcellino F.A</h6>
              <p class="small mb-2 text-muted">Author</p>
              <a href="https://www.mrchllanuu.eu.org" target="_blank">Website</a>
              <a href="https://github.com/Mrchlldev" target="_blank">Github</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main class="container main-wrapper">
    <div class="row g-4 align-items-start">
      <div class="col-lg-5">
        <div class="card custom-card">
          <div class="card-body">
            <h3 class="fw-bold mb-2">QC Kata Kata</h3>
            <p class="text-muted mb-4">Buat gambar quotes kata-kata dengan style chat keren.</p>

            <form id="generateForm">
              <div class="mb-4">
                <label class="form-label">Text</label>
                <textarea
                  class="form-control"
                  id="text"
                  rows="5"
                  placeholder="Masukkan kata-kata..."
                >jangan terlalu sibuk mengejar dunia sampai sholat 5 waktu di tinggalin</textarea>
              </div>

              <button class="btn btn-primary w-100" type="submit" id="generateBtn">
                Generate
              </button>
            </form>
          </div>
        </div>

        <div class="card custom-card mt-4 text-center">
          <div class="card-body">
            <p class="mb-1">Made with ❤️‍🔥 by</p>
            <h5 class="fw-bold mb-0">Marcellino F.A</h5>
          </div>
        </div>
      </div>

      <div class="col-lg-7">
        <div class="card custom-card">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <div>
                <h4 class="fw-bold mb-0">Result</h4>
                <small class="text-muted">Preview gambar akan muncul di sini.</small>
              </div>

              <a id="downloadBtn" class="btn btn-success btn-sm disabled" download="qc-kata-kata.png">
                Download
              </a>
            </div>

            <div class="result-box">
              <div id="emptyResult" class="text-muted text-center">
                Belum ada gambar.
              </div>

              <img id="resultImg" class="img-fluid d-none" alt="QC Kata Kata Result">
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
